model:
  vocab_size:   50257
  max_seq_len:  512
  hidden_size:  768
  n_layers:     12
  n_heads:      12
  mlp_ratio:    4.0
  dropout:      0.1
  tie_embeddings: true

data:
  train_path: data/sft_train.jsonl
  eval_path:  data/sft_eval.jsonl

training:
  batch_size:    16
  max_steps:     10000
  learning_rate: 2.0e-4
  weight_decay:  0.01
  warmup_steps:  500
  log_every:     100
  eval_every:    500
  grad_clip:     1.0
