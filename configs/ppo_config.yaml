model:
  vocab_size:   50257
  max_seq_len:  512
  hidden_size:  768
  n_layers:     12
  n_heads:      12
  mlp_ratio:    4.0
  dropout:      0.1

data:
  # List of prompts used for rollout collection
  prompts:
    - "Explain the theory of relativity in simple terms."
    - "What are the ethical implications of AI?"
    - "Write a short story about a robot."
    - "How can we solve climate change?"
    - "Describe the history of the internet."

training:
  policy_lr:      1.0e-5
  value_lr:       1.0e-4
  clip_eps:       0.2
  value_clip_eps: 0.2
  kl_coef:        0.1
  entropy_coef:   0.01
  value_coef:     0.5
  ppo_epochs:     4
  rollout_batch:  8
  max_new_tokens: 128
  max_steps:      1000
  log_every:      10
  temperature:    1.0
  gamma:          0.99
  lam:            0.95
